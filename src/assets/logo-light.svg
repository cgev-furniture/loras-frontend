<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 60" role="img" aria-label="LORAS Furniture">
  <title>LORAS Furniture</title>

  <!-- LA Mark: geometric triangular symbol — light variant for dark backgrounds -->
  <!-- Left leg (L element) — warm cream -->
  <polygon points="4,52 18,52 34,8 20,8" fill="#F4EBE1"/>
  <!-- Right leg and apex — warm caramel -->
  <polygon points="34,8 48,52 34,52 20,8" fill="#8B622F"/>
  <!-- Crossbar connecting two legs — cream -->
  <rect x="14" y="35" width="28" height="5" fill="#F4EBE1"/>

  <!-- Wordmark — cream on dark -->
  <text
    x="62"
    y="32"
    font-family="'Poppins', system-ui, sans-serif"
    font-size="24"
    font-weight="700"
    fill="#F4EBE1"
    letter-spacing="2"
  >LORAS</text>
  <text
    x="62"
    y="50"
    font-family="'Poppins', system-ui, sans-serif"
    font-size="11"
    font-weight="500"
    fill="#F4EBE1"
    letter-spacing="3.5"
  >FURNITURE</text>
</svg>
